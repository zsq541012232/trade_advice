name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    # 交易日（周一到周五）每 5 分钟触发一次，再由 RUN_ADVICE_TIME 控制是否真正执行。
    - cron: '*/5 * * * 1-5'

jobs:
  run-advice:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    env:
      LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
      
      # AIHUBMIX
      AIHUBMIX_API_KEY: ${{ secrets.AIHUBMIX_API_KEY }}
      AIHUBMIX_BASE_URL: ${{ vars.AIHUBMIX_BASE_URL }}
      AIHUBMIX_MODEL: ${{ vars.AIHUBMIX_MODEL }}
      
      # NVIDIA NIM
      NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
      NIM_API_KEY: ${{ secrets.NIM_API_KEY }}
      NIM_BASE_URL: ${{ vars.NIM_BASE_URL }}
      NIM_MODEL: ${{ vars.NIM_MODEL }}
      NVIDIA_NIM_BASE_URL: ${{ vars.NVIDIA_NIM_BASE_URL }}
      NVIDIA_NIM_MODEL: ${{ vars.NVIDIA_NIM_MODEL }}
      
      # LM Studio
      LMSTUDIO_API_KEY: ${{ secrets.LMSTUDIO_API_KEY }}
      LMSTUDIO_BASE_URL: ${{ vars.LMSTUDIO_BASE_URL }}
      LMSTUDIO_MODEL: ${{ vars.LMSTUDIO_MODEL }}
      
      # Hugging Face
      HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
      HF_API_KEY: ${{ secrets.HF_API_KEY }}
      HUGGINGFACE_BASE_URL: ${{ vars.HUGGINGFACE_BASE_URL }}
      HUGGINGFACE_MODEL: ${{ vars.HUGGINGFACE_MODEL }}

      # Stock & Routing
      STOCK_CODES: ${{ vars.STOCK_CODES }}
      EMAIL_STOCK_ROUTER: ${{ vars.EMAIL_STOCK_ROUTER }}
      
      # DuckDuckGo & Search
      DUCKDUCKGO_MAX_RESULTS: ${{ vars.DUCKDUCKGO_MAX_RESULTS }}
      DUCKDUCKGO_REGION: ${{ vars.DUCKDUCKGO_REGION }}
      SEARCH_USE_VPN: ${{ vars.SEARCH_USE_VPN }}
      CLASH_SUBSCRIPTION_URL: ${{ secrets.CLASH_SUBSCRIPTION_URL }}
      CLASH_PROXY_URL: ${{ vars.CLASH_PROXY_URL }}
      CHAIN_OF_SEARCH_DEPTH: ${{ vars.CHAIN_OF_SEARCH_DEPTH }}
      INFORMATION_ASSESSMENT_ROUNDS: ${{ vars.INFORMATION_ASSESSMENT_ROUNDS }}
      SEARCH_REFLECTION_MAX_ROUNDS: ${{ vars.SEARCH_REFLECTION_MAX_ROUNDS }}
      
      # Market Data
      MARKET_DATA_PROVIDER: ${{ vars.MARKET_DATA_PROVIDER }}
      
      # Email SMTP
      SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
      SENDER_AUTH_CODE: ${{ secrets.SENDER_AUTH_CODE }}
      SMTP_HOST: ${{ vars.SMTP_HOST }}
      SMTP_PORT: ${{ vars.SMTP_PORT }}
      SMTP_SECURITY: ${{ vars.SMTP_SECURITY }}
      EMAIL_DELIVERY_PROTOCOL: ${{ vars.EMAIL_DELIVERY_PROTOCOL }}
      
      # Email Exchange
      EXCHANGE_TENANT_ID: ${{ vars.EXCHANGE_TENANT_ID }}
      EXCHANGE_CLIENT_ID: ${{ vars.EXCHANGE_CLIENT_ID }}
      EXCHANGE_CLIENT_SECRET: ${{ secrets.EXCHANGE_CLIENT_SECRET }}
      EXCHANGE_SENDER_UPN: ${{ vars.EXCHANGE_SENDER_UPN }}
      
      # Schedule
      RUN_ADVICE_TIME: ${{ vars.RUN_ADVICE_TIME }}
      RUN_ADVICE_TIMEZONE: ${{ vars.RUN_ADVICE_TIMEZONE }}
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate required envs
        run: |
          PROVIDER="${LLM_PROVIDER:-aihubmix}"

          if [ "$PROVIDER" = "aihubmix" ] && [ -z "$AIHUBMIX_API_KEY" ]; then
            echo "Missing secret AIHUBMIX_API_KEY when LLM_PROVIDER=aihubmix" >&2
            exit 1
          fi

          if [ "$PROVIDER" = "nim" ] && [ -z "$NVIDIA_NIM_API_KEY" ] && [ -z "$NIM_API_KEY" ]; then
            echo "Missing secret NVIDIA_NIM_API_KEY (or NIM_API_KEY) when LLM_PROVIDER=nim" >&2
            exit 1
          fi
          
          if [ "$PROVIDER" = "huggingface" ] && [ -z "$HUGGINGFACE_API_KEY" ] && [ -z "$HF_API_KEY" ]; then
            echo "Missing secret HUGGINGFACE_API_KEY (or HF_API_KEY) when LLM_PROVIDER=huggingface" >&2
            exit 1
          fi
          
          # LM Studio 通常不需要 API Key，故此处跳过强制校验，但仍然需验证 provider 名称合法性

          if [ "$PROVIDER" != "aihubmix" ] && [ "$PROVIDER" != "nim" ] && [ "$PROVIDER" != "lmstudio" ] && [ "$PROVIDER" != "huggingface" ]; then
            echo "Invalid LLM_PROVIDER: $PROVIDER (only aihubmix, nim, lmstudio, or huggingface)" >&2
            exit 1
          fi

          if [ -z "$STOCK_CODES" ] && [ -z "$EMAIL_STOCK_ROUTER" ]; then
            echo "Missing repo variable STOCK_CODES (or EMAIL_STOCK_ROUTER)" >&2
            exit 1
          fi

      - name: Check schedule window
        if: github.event_name == 'schedule'
        run: |
          RUN_TIME="${RUN_ADVICE_TIME:-18:00}"
          RUN_TZ="${RUN_ADVICE_TIMEZONE:-Asia/Shanghai}"

          if ! echo "$RUN_TIME" | grep -Eq '^([01][0-9]|2[0-3]):[0-5][0-9]$'; then
            echo "RUN_ADVICE_TIME must be HH:MM, got: $RUN_TIME" >&2
            exit 1
          fi

          NOW_TIME=$(TZ="$RUN_TZ" date +"%H:%M")
          echo "Now in $RUN_TZ: $NOW_TIME; target: $RUN_TIME"

          if [ "$NOW_TIME" != "$RUN_TIME" ]; then
            echo "Not in scheduled window, skip running adviser."
            echo "SHOULD_RUN=false" >> "$GITHUB_ENV"
          else
            echo "In scheduled window, adviser will run."
            echo "SHOULD_RUN=true" >> "$GITHUB_ENV"
          fi

      - name: Run stock adviser
        if: github.event_name == 'workflow_dispatch' || env.SHOULD_RUN == 'true'
        run: python adviser.py --pretty-json
