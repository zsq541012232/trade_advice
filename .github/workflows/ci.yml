name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  run-advice:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      AIHUBMIX_API_KEY: ${{ secrets.AIHUBMIX_API_KEY }}
      AIHUBMIX_BASE_URL: ${{ vars.AIHUBMIX_BASE_URL }}
      AIHUBMIX_MODEL: ${{ vars.AIHUBMIX_MODEL }}
      STOCK_CODES: ${{ vars.STOCK_CODES }}
      EMAIL_STOCK_ROUTER: ${{ vars.EMAIL_STOCK_ROUTER }}
      DUCKDUCKGO_MAX_RESULTS: ${{ vars.DUCKDUCKGO_MAX_RESULTS }}
      DUCKDUCKGO_REGION: ${{ vars.DUCKDUCKGO_REGION }}
      MARKET_DATA_PROVIDER: ${{ vars.MARKET_DATA_PROVIDER }}
      SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
      SENDER_AUTH_CODE: ${{ secrets.SENDER_AUTH_CODE }}
      SMTP_HOST: ${{ vars.SMTP_HOST }}
      SMTP_PORT: ${{ vars.SMTP_PORT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate required envs
        run: |
          if [ -z "$AIHUBMIX_API_KEY" ]; then
            echo "Missing secret AIHUBMIX_API_KEY" >&2
            exit 1
          fi
          if [ -z "$STOCK_CODES" ] && [ -z "$EMAIL_STOCK_ROUTER" ]; then
            echo "Missing repo variable STOCK_CODES (or EMAIL_STOCK_ROUTER)" >&2
            exit 1
          fi

      - name: Run stock adviser
        run: python adviser.py --pretty-json
